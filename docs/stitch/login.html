        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .brutalist-input:focus {
        box-shadow: 0 0 0 2px #D4FF00;
      }

        text-shadow: 0 0 10px rgba(212, 255, 0, 0.4);
      }

<body class="bg-background text-on-background font-body min-h-screen flex flex-col selection:bg-primary selection:text-black">
<!-- Login Container -->
<main class="flex-grow flex items-center justify-center px-6 py-12">
<div class="w-full max-w-sm">
<!-- Branding Header (Following Shared Components Identity) -->
<div class="mb-16 flex flex-col items-center">
<div class="flex items-center gap-2 mb-4">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="account_balance_wallet">account_balance_wallet</span>
<h1 class="font-headline font-black tracking-tighter text-4xl text-primary uppercase">DIVIDIR</h1>
</div>
<div class="flex items-center gap-2">
<span class="h-[1px] w-4 bg-outline"></span>
<p class="font-mono text-[10px] uppercase tracking-[0.3em] text-on-surface-variant">Auth Protocol v2.0</p>
<span class="h-[1px] w-4 bg-outline"></span>
</div>
</div>
<!-- Login Form -->
<div class="space-y-8">
<!-- Email Field Group -->
<div class="space-y-2">
<label class="block font-mono text-[11px] uppercase tracking-widest text-on-surface-variant ml-1" for="email">
                        Terminal_Input: Email
                    </label>
<div class="relative">
<input class="w-full bg-surface-container border border-outline px-4 py-4 font-mono text-sm text-primary placeholder:text-on-surface-variant/30 brutalist-input outline-none transition-all rounded-none" id="email" placeholder="tu@email.com" type="email"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant/40">
<span class="material-symbols-outlined text-sm" data-icon="alternate_email">alternate_email</span>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col gap-4">
<!-- Magic Link Button (Neon Primary) -->
<button class="w-full bg-primary text-black font-headline font-bold uppercase py-4 tracking-widest text-[13px] hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2 shadow-[4px_4px_0px_0px_rgba(212,255,0,0.2)]">
                        Enviar Magic Link
                        <span class="material-symbols-outlined" data-icon="bolt" style="font-variation-settings: 'FILL' 1;">bolt</span>
</button>
<!-- Divider -->
<div class="flex items-center gap-4 py-2">
<div class="h-[1px] flex-grow bg-outline"></div>
<span class="font-mono text-[10px] text-on-surface-variant">OR</span>
<div class="h-[1px] flex-grow bg-outline"></div>
</div>
<!-- Google Button (Brutalist Style) -->
<button class="w-full bg-transparent border border-outline text-on-surface font-headline font-semibold py-4 tracking-normal text-[14px] hover:bg-surface-container active:scale-[0.98] transition-all flex items-center justify-center gap-3">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                        Continuar con Google
                    </button>
</div>
<!-- Micro-copy -->
<div class="text-center">
<p class="font-mono text-[11px] text-on-surface-variant leading-relaxed">
                        ¿No tienes cuenta? <span class="text-primary cursor-pointer hover:underline">Sincronizar nuevo nodo</span>
</p>
</div>
</div>
</div>
</main>
<!-- Footer Legal (Brutalist Static) -->
<footer class="p-8 border-t border-outline/50 flex flex-col md:flex-row justify-between items-center gap-6">
<div class="flex items-center gap-6">
<div class="flex items-center gap-2 group cursor-crosshair">
<span class="w-2 h-2 rounded-full bg-secondary group-hover:animate-pulse"></span>
<span class="font-mono text-[10px] uppercase tracking-tighter text-on-surface-variant">System Status: Stable</span>
</div>
<div class="hidden md:block h-4 w-[1px] bg-outline"></div>
<p class="font-mono text-[10px] text-on-surface-variant/60">© 2024 DIVIDIR PROTOCOL. ALL RIGHTS RESERVED.</p>
</div>
<nav class="flex gap-8">
<a class="font-mono text-[10px] uppercase tracking-widest text-on-surface-variant hover:text-primary transition-colors" href="#">Privacy_Policy</a>
<a class="font-mono text-[10px] uppercase tracking-widest text-on-surface-variant hover:text-primary transition-colors" href="#">Terms_of_Service</a>
</nav>
</footer>
<!-- Background Decorative Element (Subtle grid) -->
<div class="fixed inset-0 pointer-events-none -z-10 opacity-20" style="background-image: radial-gradient(#222 1px, transparent 1px); background-size: 24px 24px;"></div>
